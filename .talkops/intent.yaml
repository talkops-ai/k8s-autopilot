schema_version: '1.0'
name: k8s-autopilot CI
metadata:
  project_type: service
  owner: unknown-team
  reconciliation_mode: strict
runtime:
  language: python
  version: '3.12'
  package_manager: uv
triggers:
- event: pull_request
  branches:
  - main
- event: push
  branches:
  - main
stages:
- id: validate-validate
  name: 'Validate: Code Quality'
  needs: []
  timeout_minutes: 30
  enforcement: null
  thresholds: {}
  setup:
  - type: package_manager_setup
    runtime: null
    version: null
    tool: uv
    command: null
  - type: cache
    runtime: null
    version: null
    tool: null
    command: null
  - type: checkout
    runtime: null
    version: null
    tool: null
    command: null
  - type: runtime_setup
    runtime: python
    version: ${{ env.PYTHON_VERSION }}
    tool: null
    command: null
  - type: cache
    runtime: null
    version: null
    tool: null
    command: null
  - type: dependency_install
    runtime: null
    version: null
    tool: null
    command: 'python -m pip install --upgrade pip && pip install uv && uv sync --python
      ${{ env.PYTHON_VERSION }} --frozen --dev --no-install-project --no-editable

      '
  tasks:
  - id: ruff-format-check
    name: Run ruff format check
    capability: format-check
    tool: ruff
    tool_version: null
    command: ruff format --check .
    config: {}
    env: {}
    fail_on_error: true
  - id: ruff-lint
    name: Run ruff linter (uses pyproject.toml ruff config)
    capability: lint
    tool: ruff
    tool_version: null
    command: ruff check .
    config: {}
    env: {}
    fail_on_error: true
  - id: mypy
    name: Run mypy type checks (pyproject.toml config is used)
    capability: type-check
    tool: mypy
    tool_version: null
    command: mypy .
    config: {}
    env: {}
    fail_on_error: true
  services: []
- id: test-test
  name: 'Test: Unit Tests & Coverage'
  needs:
  - validate-validate
  timeout_minutes: 30
  enforcement: mandatory
  thresholds: {}
  setup:
  - type: package_manager_setup
    runtime: null
    version: null
    tool: uv
    command: null
  - type: cache
    runtime: null
    version: null
    tool: null
    command: null
  - type: checkout
    runtime: null
    version: null
    tool: null
    command: null
  - type: runtime_setup
    runtime: python
    version: ${{ env.PYTHON_VERSION }}
    tool: null
    command: null
  - type: cache
    runtime: null
    version: null
    tool: null
    command: null
  - type: dependency_install
    runtime: null
    version: null
    tool: null
    command: 'python -m pip install --upgrade pip && pip install uv && uv sync --python
      ${{ env.PYTHON_VERSION }} --frozen --dev --no-install-project --no-editable

      '
  tasks:
  - id: pytest-coverage
    name: Run pytest with coverage and enforce threshold
    capability: coverage+coverage
    tool: pytest
    tool_version: null
    command: 'pytest --cov=${{ env.COVERAGE_PACKAGE }} --cov-report=xml --cov-report=term
      --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      '
    config: {}
    env: {}
    fail_on_error: true
  services: []
- id: build-package-build
  name: 'Build & Package: Docker Build & Image Scan'
  needs:
  - test-test
  timeout_minutes: 60
  enforcement: null
  thresholds: {}
  setup:
  - type: checkout
    runtime: null
    version: null
    tool: null
    command: null
  tasks:
  - id: docker-build
    name: Build Docker image
    capability: docker-build
    tool: docker
    tool_version: null
    command: docker build --progress=plain -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG
      }} .
    config: {}
    env: {}
    fail_on_error: true
  - id: trivy-action
    name: Scan image with Aquasecurity Trivy (action)
    capability: image-scan
    tool: trivy
    tool_version: 0.46.0
    command: null
    config:
      image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      format: table
      severity: HIGH,CRITICAL
      exit-code: 1
    env: {}
    fail_on_error: true
  - id: trivy-fallback
    name: 'Fallback: run Trivy scanner in container if action is unavailable'
    capability: image-scan
    tool: docker
    tool_version: null
    command: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.39.0
      image --severity HIGH,CRITICAL ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    config: {}
    env: {}
    fail_on_error: true
  services: []
docker:
  dockerfile: Dockerfile
  base_image: null
  image_name: k8s-autopilot
  image_tag: ${{ github.sha }}
  exposed_ports: []
