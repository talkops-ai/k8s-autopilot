name: k8s-autopilot CI
on:
  push:
    branches:
      - main
permissions:
  contents: read
  packages: write
env:
  PYTHON_VERSION: '3.11'
  IMAGE_NAME: talkops-ai/k8s-autopilot
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io
  TRIVY_SEVERITY: HIGH,CRITICAL
jobs:
  validate-code:
    name: 'Validate: Code Quality'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      id: install-deps
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r "requirements.txt"
        fi
    - name: Format check (black)
      id: format-check
      run: |
        python -m pip install black
        black --check .
    - name: Lint (flake8)
      id: lint
      run: |
        python -m pip install flake8
        flake8 .
    - name: Type check (mypy)
      id: type-check
      run: |
        if [ -f "pyproject.toml" ] || [ -f "mypy.ini" ]; then
          python -m pip install mypy
          mypy .
        else
          echo "No mypy config found; skipping"
        fi
  test-unit:
    name: 'Test: Unit & Coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - validate-code
    steps:
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install test dependencies
      id: install-deps
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r "requirements.txt"
        fi
    - name: Run tests (pytest)
      id: pytest
      run: |
        python -m pip install pytest pytest-cov
        pytest -q --cov=.
  security-scan:
    name: 'Security: Dependency & Secret Scans'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - test-unit
    steps:
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Dependency audit (pip-audit)
      id: pip-audit
      run: |
        python -m pip install pip-audit
        python -m pip_audit
    - name: Secret detection (detect-secrets)
      id: secret-detection
      run: |
        python -m pip install detect-secrets
        detect-secrets scan
  package-docker:
    name: 'Package: Build & Scan Image'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - security-scan
    steps:
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      id: setup-docker-buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to registry
      id: login-registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    - name: Build and push Docker image
      id: build-image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Trivy scan image
      id: trivy-scan
      uses: aquasec/trivy-action@v0
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        exit-code: '1'
        severity: ${{ env.TRIVY_SEVERITY }}
        ignore-unfixed: 'false'
    - name: Push image to registry
      id: push-image
      run: |
        docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
  deploy-k8s:
    name: 'Deploy: Kubernetes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - package-docker
    steps:
    - name: Checkout
      id: checkout
      uses: actions/checkout@v4
    - name: Setup kubectl
      id: setup-kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: v1.26.0
    - name: Configure kubeconfig
      id: configure-kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > "/tmp/kubeconfig"
        chmod 600 "/tmp/kubeconfig"
        echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"
    - name: Apply Kubernetes manifests
      id: deploy-manifests
      run: |
        kubectl apply -f k8s/
        rm -f "/tmp/kubeconfig"