name: k8s-autopilot CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
env:
  PYTHON_VERSION: '3.12'
  PACKAGE_MANAGER: uv
  IMAGE_NAME: k8s-autopilot
  IMAGE_TAG: 0.1.0
  COVERAGE_THRESHOLD: '80'
  DEFAULT_BRANCH: main
jobs:
  validate-code:
    name: 'Validate: Code Quality'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: 'true'
        version: 0.4.18
    - name: Cache .venv
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
        restore-keys: ${{ runner.os }}-venv-
    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install Python dev tooling (uv + synced deps)
      id: install-dev-tools
      run: |
        python -m pip install --upgrade pip && python -m pip install uv && uv sync --python ${{ env.PYTHON_VERSION }} --frozen
      env:
        PYTHONUNBUFFERED: '1'
    - name: Check formatting with ruff (format-check)
      id: ruff-format
      run: ruff format --check .
    - name: Run ruff lint (reads configuration from pyproject.toml)
      id: ruff-lint
      run: ruff check .
    - name: Run mypy type checks
      id: mypy
      run: mypy .
  test-unit:
    name: 'Test: Unit & Coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - validate-code
    steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: 'true'
        version: 0.4.18
    - name: Cache .venv
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
        restore-keys: ${{ runner.os }}-venv-
    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install Python dev tooling (uv + synced deps)
      id: install-dev-tools
      run: |
        python -m pip install --upgrade pip && python -m pip install uv && uv sync --python ${{ env.PYTHON_VERSION }} --frozen
      env:
        PYTHONUNBUFFERED: '1'
    - name: Run pytest with coverage and enforce threshold
      id: pytest-coverage
      run: pytest --cov=k8s_autopilot --cov-report=xml:coverage.xml --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} -v --tb=short
  build-package-build-docker:
    name: 'Build & Package: Docker Build + Image Scan'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
    - test-unit
    steps:
    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Build Docker image (multi-stage Dockerfile)
      id: docker-build
      run: docker build --pull --progress=plain -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
    - name: Scan built image with Trivy (containerized trivy)
      id: trivy-scan
      uses: aquasecurity/trivy-action@v0.32.0
      with:
        image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}