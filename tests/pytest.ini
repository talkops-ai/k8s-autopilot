[pytest]
addopts = -q --tb=short
timeout = 120
markers =
    unit: deterministic tests for pure functions, schemas, and node logic
    integration: graph and dependency integration tests
    eval: trajectory and semantic evaluation tests
    sandbox: ephemeral Kubernetes sandbox tests
    hitl: human-in-the-loop interaction tests
    slow: tests that call real LLMs or external services (skipped in fast CI)
asyncio_mode = auto
