<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Outer Helm Lug -->
    <rect id="lug" x="47" y="3" width="6" height="10" rx="2" fill="#326CE5" />
    
    <!-- TalkOps Core -->
    <g id="talkops-core">
      <path d="M110 12 C58 12 16 46 16 88 c0 26 15 48 38 62 v26 l28-18 c9 2 18 3 28 3 c52 0 94-34 94-76 S162 12 110 12Z" stroke="#1F7ACB" stroke-width="10" stroke-linejoin="round" fill="none" />
      <path d="M68 92 C68 66 98 66 110 92 C122 118 152 118 152 92" stroke="#1F7ACB" stroke-width="12" stroke-linecap="round" fill="none" />
      <path d="M68 92 C68 118 98 118 110 92 C122 66 152 66 152 92" stroke="#7AC143" stroke-width="12" stroke-linecap="round" fill="none" />
    </g>

    <!-- Full k8s-autopilot Icon -->
    <g id="k8s-icon">
      <!-- 1. Outer Helm Wheel Ring -->
      <circle cx="50" cy="50" r="35" stroke="#326CE5" stroke-width="3" fill="none" />
      <use href="#lug" />
      <use href="#lug" transform="rotate(45 50 50)" />
      <use href="#lug" transform="rotate(90 50 50)" />
      <use href="#lug" transform="rotate(135 50 50)" />
      <use href="#lug" transform="rotate(180 50 50)" />
      <use href="#lug" transform="rotate(225 50 50)" />
      <use href="#lug" transform="rotate(270 50 50)" />
      <use href="#lug" transform="rotate(315 50 50)" />
      <!-- 2. Core TalkOps Cockpit -->
      <use href="#talkops-core" transform="translate(33.5, 35.9) scale(0.15)" />
    </g>
  </defs>

  <style>
    .title {
      fill: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .subtitle {
      fill: #6B7280;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0px;
    }
    .brand {
      fill: #1F7ACB;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      .title { fill: #F9FAFB; }
      .subtitle { fill: #9CA3AF; }
      .brand { fill: #3B82F6; }
    }
  </style>

  <!-- Left: Icon (scaled up by 1.6 to be 160x160, centered vertically in 200px height) -->
  <use href="#k8s-icon" transform="translate(40, 20) scale(1.6)" />

  <!-- Right: Text Lockup -->
  <!-- 40 + 160 + 40 margin = 240 -->
  <text x="240" y="105" class="title">k8s-autopilot</text>
  <text x="242" y="155" class="subtitle">by <tspan class="brand">TalkOps.ai</tspan></text>

</svg>
